name: Board Room Automation

on:
  issues:
    types: [opened, reopened, closed, assigned]
  pull_request:
    types: [opened, reopened, closed, converted_to_draft, ready_for_review]
  project_card:
    types: [moved]

env:
  PROJECT_NUMBER: 1  # Will be updated after board creation

jobs:
  auto-add-to-board:
    name: Add to Board Room
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' || github.event_name == 'pull_request'
    steps:
      - name: Add issue/PR to project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/liferoundhere/projects/${{ env.PROJECT_NUMBER }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  update-status:
    name: Update Board Status
    runs-on: ubuntu-latest
    steps:
      - name: Move to In Progress when assigned
        if: github.event_name == 'issues' && github.event.action == 'assigned'
        uses: actions/github-script@v7
        with:
          script: |
            const projectNumber = process.env.PROJECT_NUMBER;
            // Query for project item
            const query = `
              query($owner: String!, $repo: String!, $issueNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issueNumber) {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project {
                          number
                        }
                      }
                    }
                  }
                }
              }
            `;
            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issueNumber: context.issue.number
            });
            
            const item = result.repository.issue.projectItems.nodes.find(
              n => n.project.number == projectNumber
            );
            if (!item) return;
            
            // Get status field ID for "In Progress"
            // This requires knowing the field ID, which we set in the project config
            console.log(`Issue #${context.issue.number} assigned — update board manually or ensure project workflow is configured`);

      - name: Move to Done when closed
        if: (github.event_name == 'issues' && github.event.action == 'closed') || (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
        run: |
          echo "Item closed/merged — ensure project automation moves it to Done"

  auto-label:
    name: Auto Label
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];
            
            if (title.includes('bug') || title.includes('fix') || title.includes('error')) labels.push('bug');
            if (title.includes('feature') || title.includes('add') || title.includes('new')) labels.push('enhancement');
            if (title.includes('doc') || title.includes('readme')) labels.push('documentation');
            if (title.includes('agent') || title.includes('workflow') || title.includes('kanban')) labels.push('multi-agent');
            if (title.includes('test')) labels.push('testing');
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
