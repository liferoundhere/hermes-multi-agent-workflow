name: Multi-Agent Board Room

on:
  issues:
    types: [opened, edited, reopened, closed, assigned, unassigned, labeled]
  pull_request:
    types: [opened, edited, reopened, closed, converted_to_draft, ready_for_review]
  issue_comment:
    types: [created]

env:
  # Update this after creating the Board Room project
  # Find it at: https://github.com/users/liferoundhere/projects
  PROJECT_NUMBER: 1

jobs:
  add-to-board:
    name: Add to Board Room
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'pull_request' && github.event.action == 'opened')
    steps:
      - name: Add to Board Room project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/liferoundhere/projects/${{ env.PROJECT_NUMBER }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  auto-status:
    name: Auto-Update Status
    runs-on: ubuntu-latest
    steps:
      - name: Set In Progress on assignment
        if: github.event_name == 'issues' && github.event.action == 'assigned'
        uses: actions/github-script@v7
        with:
          script: |
            const statusFieldName = 'Status';
            const targetStatus = 'In Progress';
            
            console.log(`Issue #${context.issue.number} assigned. Consider moving to ${targetStatus} in Board Room.`);
            
            // Note: Full automation requires project field IDs which are set up after board creation
            // This workflow serves as the hook — extend it once the project is configured

      - name: Set Done on close/merge
        if: |
          (github.event_name == 'issues' && github.event.action == 'closed') ||
          (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true)
        uses: actions/github-script@v7
        with:
          script: |
            console.log(`Item closed/merged. Move to Done in Board Room.`);

  priority-label:
    name: Priority Triage
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const labelsToAdd = [];
            
            // Agent/scout labels
            if (title.includes('scout') || body.includes('scout')) labelsToAdd.push('scout');
            if (title.includes('orchestrator') || body.includes('orchestrator')) labelsToAdd.push('orchestrator');
            if (title.includes('research') || body.includes('research')) labelsToAdd.push('research');
            if (title.includes('builder') || body.includes('builder')) labelsToAdd.push('builder');
            if (title.includes('test') || body.includes('test')) labelsToAdd.push('testing');
            
            // Status labels
            if (title.includes('todo') || title.includes('to do')) labelsToAdd.push('status: todo');
            if (title.includes('ready')) labelsToAdd.push('status: ready');
            if (title.includes('in progress') || title.includes('wip')) labelsToAdd.push('status: in-progress');
            if (title.includes('done') || title.includes('complete')) labelsToAdd.push('status: done');
            
            // Workflow path labels
            if (title.includes('build') || title.includes('cli') || title.includes('tool')) labelsToAdd.push('path: build');
            if (title.includes('video') || title.includes('deck') || title.includes('slide')) labelsToAdd.push('path: video');
            
            // Pain point labels
            if (title.includes('bug') || title.includes('fix') || title.includes('error') || title.includes('crash')) labelsToAdd.push('bug');
            if (title.includes('feature') || title.includes('enhancement')) labelsToAdd.push('enhancement');
            
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labelsToAdd
              });
              console.log(`Added labels: ${labelsToAdd.join(', ')}`);
            }

  proposal-gate:
    name: Proposal Human Gate Trigger
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/approve') ||
      contains(github.event.comment.body, '/shelve') ||
      contains(github.event.comment.body, '/modify')
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body;
            const issueNumber = context.issue.number;
            
            if (comment.includes('/approve')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '🚀 **Proposal approved.** Moving to fulfillment pipeline. Builder agent will be dispatched.'
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['approved', 'status: in-progress']
              });
            } else if (comment.includes('/shelve')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '💾 **Proposal shelved.** Task archived. Reason: human decision at approval gate.'
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['shelved']
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed'
              });
            } else if (comment.includes('/modify')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '✍️ **Proposal sent back for modification.** Please edit the issue description with your feedback, then re-submit for review.'
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['needs-modification']
              });
            }
